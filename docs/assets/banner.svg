<svg width="1200" height="300" viewBox="0 0 1200 300" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="BySentinel: from error to explained fix, automatically.">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="300" gradientUnits="userSpaceOnUse">
      <stop stop-color="#14161c"/>
      <stop offset="1" stop-color="#101218"/>
    </linearGradient>
    <linearGradient id="iris" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#8a7bf7"/>
      <stop offset="1" stop-color="#5b48e0"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.5">
      <stop stop-color="#6d5cf0" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#6d5cf0" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" width="34" height="34" patternUnits="userSpaceOnUse">
      <path d="M34 0H0V34" fill="none" stroke="#ffffff" stroke-opacity="0.04" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="1200" height="300" rx="16" fill="url(#bg)"/>
  <rect width="1200" height="300" rx="16" fill="url(#grid)"/>
  <ellipse cx="250" cy="150" rx="360" ry="220" fill="url(#glow)"/>

  <!-- moving accent scan line (degrades to static if SMIL is stripped) -->
  <rect x="0" y="0" width="2" height="300" fill="#6d5cf0" opacity="0.5">
    <animate attributeName="x" values="120;1080;120" dur="7s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;0.5;0" dur="7s" repeatCount="indefinite"/>
  </rect>

  <!-- brand shield -->
  <g transform="translate(96 96)">
    <rect width="108" height="108" rx="26" fill="url(#iris)"/>
    <rect width="108" height="108" rx="26" fill="none" stroke="#ffffff" stroke-opacity="0.14"/>
    <g transform="translate(26 24)" stroke="#ffffff" stroke-linejoin="round" stroke-linecap="round">
      <path d="M28 3 6 11v16c0 12.5 8.8 22.6 22 27 13.2-4.4 22-14.5 22-27V11L28 3Z" fill="#ffffff" fill-opacity="0.16" stroke-width="3.4"/>
      <path d="M17 30l7.5 7.5L40 22" fill="none" stroke-width="4.4">
        <animate attributeName="stroke-opacity" values="0.55;1;0.55" dur="3.5s" repeatCount="indefinite"/>
      </path>
    </g>
  </g>

  <!-- wordmark + tagline -->
  <g font-family="ui-sans-serif, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif">
    <text x="248" y="132" fill="#f3f4f8" font-size="62" font-weight="700" letter-spacing="-1.5">BySentinel</text>
    <text x="250" y="176" fill="#c9ccd8" font-size="26" font-weight="500">From error to explained fix, automatically.</text>
    <text x="250" y="212" fill="#8a8fa3" font-size="16.5" font-weight="500" letter-spacing="0.2" font-family="ui-monospace, SFMono-Regular, Menlo, monospace">AI incident analysis · code-aware · reproduces in a sandbox · self-hosted</text>
  </g>
</svg>
